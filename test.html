<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Groq Test</title></head>
<body style="font-family:sans-serif;padding:40px;background:#111;color:#fff">
<h2>Groq API Test</h2>
<button onclick="test()" style="padding:12px 24px;background:#E8373D;color:white;border:none;border-radius:8px;font-size:16px;cursor:pointer">Тест хийх</button>
<div id="result" style="margin-top:20px;padding:16px;background:#222;border-radius:8px;min-height:60px"></div>
<script>
async function test() {
  document.getElementById('result').textContent = 'Хүсэлт илгээж байна...';
  try {
    const r = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer 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'
      },
      body: JSON.stringify({
        model: 'llama-3.1-8b-instant',
        max_tokens: 100,
        messages: [{role:'user', content:'Сайн байна уу гэж монголоор хариул'}]
      })
    });
    const data = await r.json();
    console.log('Response:', data);
    if (data.choices) {
      document.getElementById('result').textContent = '✅ Ажиллаж байна! Хариу: ' + data.choices[0].message.content;
    } else {
      document.getElementById('result').textContent = '❌ Алдаа: ' + JSON.stringify(data);
    }
  } catch(e) {
    document.getElementById('result').textContent = '❌ Error: ' + e.message;
  }
}
</script>
</body>
</html>
