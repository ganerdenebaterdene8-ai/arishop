<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>АРИ ШОП — Солонгосоос Монголд</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&family=Noto+Sans+Mongolian&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #E8373D;
    --gold: #F5A623;
    --bg: #09090F;
    --bg2: #13131C;
    --bg3: #1A1A26;
    --text: #F0EEE9;
    --muted: #888899;
    --border: rgba(255,255,255,0.07);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Outfit', sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    overflow-x: hidden;
  }

  /* NAV */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 20px 60px;
    background: rgba(9,9,15,0.85);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
  }
  .logo {
    font-size: 22px; font-weight: 900; letter-spacing: -0.5px;
    color: var(--text);
  }
  .logo span { color: var(--red); }
  .nav-links { display: flex; gap: 36px; list-style: none; }
  .nav-links a {
    color: var(--muted); text-decoration: none;
    font-size: 14px; font-weight: 400; transition: color 0.2s;
  }
  .nav-links a:hover { color: var(--text); }
  .nav-cta {
    background: var(--red); color: white;
    padding: 10px 24px; border-radius: 8px;
    font-weight: 600; font-size: 14px;
    text-decoration: none; transition: opacity 0.2s;
  }
  .nav-cta:hover { opacity: 0.85; }

  /* HERO */
  .hero {
    min-height: 100vh;
    display: flex; flex-direction: column;
    justify-content: center; align-items: flex-start;
    padding: 140px 60px 80px;
    position: relative; overflow: hidden;
  }
  .hero-bg {
    position: absolute; inset: 0;
    background: radial-gradient(ellipse 60% 60% at 70% 50%, rgba(232,55,61,0.08) 0%, transparent 70%);
    pointer-events: none;
  }
  .hero-tag {
    display: inline-flex; align-items: center; gap: 8px;
    background: rgba(232,55,61,0.12);
    border: 1px solid rgba(232,55,61,0.25);
    color: var(--red); font-size: 13px; font-weight: 600;
    padding: 6px 14px; border-radius: 100px;
    margin-bottom: 32px; letter-spacing: 0.5px;
  }
  .hero-tag::before {
    content: ''; width: 6px; height: 6px;
    background: var(--red); border-radius: 50%;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }
  .hero h1 {
    font-size: clamp(52px, 7vw, 96px);
    font-weight: 900; line-height: 1.0;
    letter-spacing: -3px; max-width: 900px;
    margin-bottom: 28px;
  }
  .hero h1 .accent { color: var(--red); }
  .hero h1 .gold { color: var(--gold); }
  .hero-sub {
    font-size: 18px; color: var(--muted); max-width: 560px;
    margin-bottom: 48px; line-height: 1.7; font-weight: 400;
  }
  .hero-actions { display: flex; gap: 16px; flex-wrap: wrap; align-items: center; }
  .btn-primary {
    background: var(--red); color: white;
    padding: 16px 36px; border-radius: 10px;
    font-weight: 700; font-size: 15px;
    text-decoration: none; transition: all 0.2s;
    border: none; cursor: pointer;
  }
  .btn-primary:hover { background: #cf2f34; transform: translateY(-1px); }
  .btn-secondary {
    color: var(--text); border: 1px solid var(--border);
    padding: 16px 36px; border-radius: 10px;
    font-weight: 600; font-size: 15px;
    text-decoration: none; transition: all 0.2s; cursor: pointer;
    background: transparent;
  }
  .btn-secondary:hover { border-color: rgba(255,255,255,0.2); background: var(--bg2); }
  .hero-stats {
    display: flex; gap: 48px; margin-top: 80px;
    padding-top: 48px; border-top: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .stat-num { font-size: 36px; font-weight: 900; letter-spacing: -1px; }
  .stat-num span { color: var(--red); }
  .stat-label { font-size: 13px; color: var(--muted); margin-top: 4px; }

  /* PLATFORMS */
  .section { padding: 100px 60px; }
  .section-tag {
    font-size: 12px; font-weight: 700; letter-spacing: 2px;
    color: var(--red); text-transform: uppercase; margin-bottom: 16px;
  }
  .section-title {
    font-size: clamp(32px, 4vw, 52px); font-weight: 900;
    letter-spacing: -1.5px; line-height: 1.1; margin-bottom: 16px;
  }
  .section-sub {
    font-size: 17px; color: var(--muted); max-width: 560px; margin-bottom: 60px;
  }
  .platforms-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 16px;
  }
  .platform-card {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 16px; padding: 32px 28px;
    transition: all 0.3s; cursor: default;
    position: relative; overflow: hidden;
  }
  .platform-card::before {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(ellipse 80% 80% at 50% -10%, rgba(232,55,61,0.06) 0%, transparent 70%);
    opacity: 0; transition: opacity 0.3s;
  }
  .platform-card:hover { border-color: rgba(232,55,61,0.3); transform: translateY(-4px); }
  .platform-card:hover::before { opacity: 1; }
  .platform-icon {
    width: 52px; height: 52px; border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; margin-bottom: 20px; font-weight: 900;
  }
  .platform-name { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
  .platform-desc { font-size: 14px; color: var(--muted); line-height: 1.6; }
  .platform-badge {
    display: inline-block; margin-top: 16px;
    background: rgba(245,166,35,0.12); color: var(--gold);
    border: 1px solid rgba(245,166,35,0.2);
    font-size: 11px; font-weight: 700; letter-spacing: 0.5px;
    padding: 4px 10px; border-radius: 100px;
  }

  /* HOW IT WORKS */
  .hiw-bg { background: var(--bg2); }
  .steps {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 0; position: relative;
  }
  .steps::before {
    content: ''; position: absolute;
    top: 44px; left: 10%; right: 10%; height: 1px;
    background: linear-gradient(90deg, transparent, var(--border) 20%, var(--border) 80%, transparent);
  }
  .step { padding: 40px 32px; text-align: center; position: relative; }
  .step-num {
    width: 52px; height: 52px; border-radius: 14px;
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: 900; margin: 0 auto 24px;
    background: var(--bg); position: relative; z-index: 1;
    color: var(--red);
  }
  .step-title { font-size: 18px; font-weight: 700; margin-bottom: 12px; }
  .step-desc { font-size: 14px; color: var(--muted); line-height: 1.7; }

  /* CALCULATOR */
  .calc-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 60px; align-items: center;
  }
  .calc-box {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 20px; padding: 40px;
  }
  .calc-box h3 { font-size: 22px; font-weight: 700; margin-bottom: 28px; }
