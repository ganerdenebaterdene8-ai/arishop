<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>АриШоп — Монголоор хайх</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --red:#E8373D; --gold:#F5A623; --green:#16a34a;
  --bg:#09090F; --bg2:#13131C; --bg3:#1A1A26;
  --text:#F0EEE9; --muted:#888899; --border:rgba(255,255,255,0.07);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

nav{display:flex;align-items:center;justify-content:space-between;padding:16px 40px;
  background:rgba(9,9,15,0.9);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50}
.logo{font-size:20px;font-weight:900;text-decoration:none;color:var(--text)}
.logo span{color:var(--red)}
.nav-links{display:flex;gap:24px;list-style:none}
.nav-links a{color:var(--muted);text-decoration:none;font-size:14px;transition:color .2s}
.nav-links a:hover,.nav-links a.active{color:var(--text)}
.order-btn{background:var(--red);color:white;padding:9px 20px;border-radius:8px;
  font-weight:700;font-size:14px;text-decoration:none}

/* HERO SEARCH */
.hero{padding:60px 40px 40px;text-align:center}
.hero-tag{display:inline-flex;align-items:center;gap:8px;
  background:rgba(232,55,61,0.1);border:1px solid rgba(232,55,61,0.25);
  color:var(--red);font-size:12px;font-weight:700;padding:5px 14px;
  border-radius:100px;margin-bottom:20px;letter-spacing:0.5px}
.hero h1{font-size:clamp(28px,5vw,52px);font-weight:900;letter-spacing:-1.5px;margin-bottom:12px}
.hero p{font-size:16px;color:var(--muted);margin-bottom:36px}

/* SEARCH BOX */
.search-box{max-width:680px;margin:0 auto}
.search-main{display:flex;gap:10px;margin-bottom:16px}
.search-inp-wrap{flex:1;position:relative}
.search-inp{width:100%;background:var(--bg2);border:2px solid var(--border);
  color:var(--text);padding:18px 20px 18px 52px;border-radius:14px;
  font-size:17px;font-family:'Outfit',sans-serif;outline:none;transition:border-color .2s}
.search-inp:focus{border-color:rgba(232,55,61,0.5)}
.search-inp::placeholder{color:var(--muted)}
.search-ico{position:absolute;left:18px;top:50%;transform:translateY(-50%);font-size:18px}
.search-go{background:var(--red);color:white;padding:18px 28px;border-radius:14px;
  border:none;font-size:16px;font-weight:700;cursor:pointer;font-family:'Outfit',sans-serif;
  transition:all .2s;white-space:nowrap}
.search-go:hover{background:#cf2f34;transform:translateY(-1px)}
.search-go:disabled{background:#333;cursor:not-allowed;transform:none}

/* SUGGESTIONS */
.suggestions{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:12px}
.sug{padding:7px 16px;border-radius:100px;font-size:13px;font-weight:600;
  border:1px solid var(--border);background:transparent;color:var(--muted);
  cursor:pointer;font-family:'Outfit',sans-serif;transition:all .2s}
.sug:hover{border-color:rgba(232,55,61,.4);color:var(--text);background:rgba(232,55,61,.06)}

/* TRANSLATE RESULT */
.translate-box{background:var(--bg2);border:1px solid var(--border);border-radius:14px;
  padding:20px 24px;margin-bottom:24px;display:none;text-align:left}
.translate-box.show{display:block}
.tr-label{font-size:11px;font-weight:700;letter-spacing:1px;color:var(--muted);
  text-transform:uppercase;margin-bottom:10px}
.tr-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.tr-from{font-size:16px;font-weight:600;color:var(--text)}
.tr-arrow{color:var(--muted);font-size:14px}
.tr-to{font-size:18px;font-weight:700;color:var(--gold)}
.tr-note{font-size:12px;color:var(--muted);margin-top:8px}
.coupang-link{display:inline-flex;align-items:center;gap:6px;margin-top:12px;
  background:rgba(255,64,64,0.1);border:1px solid rgba(255,64,64,0.25);
  color:#FF6060;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:700;
  text-decoration:none;transition:all .2s}
.coupang-link:hover{background:rgba(255,64,64,0.2)}

/* LOADING */
.loading{text-align:center;padding:60px 20px;display:none}
.loading.show{display:block}
.spinner{width:40px;height:40px;border:3px solid var(--border);
  border-top-color:var(--red);border-radius:50%;animation:spin 0.8s linear infinite;
  margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{color:var(--muted);font-size:15px}

.results-section{max-width:1100px;margin:0 auto;padding:0 40
