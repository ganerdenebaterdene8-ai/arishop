<!DOCTYPE html>
<html lang="mn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>АриШоп — Мессенжер</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --red: #E8373D;
      --bg: #09090F;
      --bg2: #13131C;
      --bg3: #1A1A26;
      --text: #F0EEE9;
      --muted: #888899;
      --border: rgba(255,255,255,0.07);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; }

    /* NAV */
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 24px;
      border-bottom: 1px solid var(--border);
      background: rgba(9,9,15,0.9);
      backdrop-filter: blur(20px);
    }
    .nav-left { display: flex; align-items: center; gap: 12px; }
    .back-btn { color: var(--muted); text-decoration: none; font-size: 20px; cursor: pointer; }
    .nav-title { font-size: 16px; font-weight: 700; }
    .nav-status { font-size: 12px; color: #16a34a; }

    /* MAIN CHAT */
    .chat-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .messages::-webkit-scrollbar { width: 6px; }
    .messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }

    /* MESSAGE */
    .message {
      display: flex;
      margin-bottom: 8px;
    }
    .message.bot { justify-content: flex-start; }
    .message.user { justify-content: flex-end; }
    .message-bubble {
      max-width: 70%;
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.5;
      word-wrap: break-word;
    }
    .message.bot .message-bubble {
      background: var(--bg3);
      color: var(--text);
      border-radius: 4px 16px 16px 16px;
    }
    .message.user .message-bubble {
      background: var(--red);
      color: white;
      border-radius: 16px 16px 4px 16px;
    }
    .message-time {
      font-size: 11px;
      color: var(--muted);
      margin-top: 4px;
      padding: 0 12px;
    }

    /* TYPING */
    .typing {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 12px 16px;
      background: var(--bg3);
      border-radius: 4px 16px 16px 16px;
      width: fit-content;
    }
    .typing span {
      width: 6px;
      height: 6px;
      background: var(--muted);
      border-radius: 50%;
      animation: bounce 0.8s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.15s; }
    .typing span:nth-child(3) { animation-delay: 0.3s; }
    @keyframes bounce { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-5px); } }

    /* QUICK REPLIES */
    .quick-replies {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 0 24px 12px;
    }
    .qr-btn {
      padding: 8px 14px;
      border-radius: 100px;
      font-size: 12px;
      font-weight: 600;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font-family: 'Outfit', sans-serif;
      transition: all 0.2s;
    }
    .qr-btn:hover {
      border-color: rgba(232,55,61,0.4);
      color: var(--text);
    }

    /* INPUT */
    .input-area {
      padding: 16px 24px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }
    .input-wrap {
      flex: 1;
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }
    .msg-input {
      flex: 1;
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 12px 14px;
      border-radius: 12px;
      font-size: 13px;
      font-family: 'Outfit', sans-serif;
      outline: none;
      resize: none;
      min-height: 40px;
      max-height: 100px;
    }
    .msg-input:focus { border-color: rgba(232,55,61,0.5); }
    .msg-input::placeholder { color: var(--muted); }
    .send-btn {
      width: 40px;
      height: 40px;
      background: var(--red);
      border: none;
      border-radius: 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 16px;
      color: white;
      transition: background 0.2s;
    }
    .send-btn:hover { background: #cf2f34; }
    .send-btn:disabled { background: #333; cursor: not-allowed; }
  </style>
</head>
<body>
  <nav>
    <div class="nav-left">
      <a href="catalog.html" class="back-btn">←</a>
      <div>
        <div class="nav-title">АриШоп туслах</div>
        <div class="nav-status">● Онлайн</div>
      </div>
    </div>
  </nav>

  <div class="chat-container">
    <div class="messages" id="messages">
      <div class="message bot">
        <div>
          <div class="message-bubble">Сайн байнаа! 👋 АриШопын AI туслах чат рүүгээр тавтай морилно уу. Бид Солонгосоос Монгол руу захиалга дамжуулдаг.</div>
          <div class="message-time">7:01</div>
        </div>
      </div>
    </div>

    <div class="quick-replies" id="quickReplies">
      <button class="qr-btn" onclick="sendMessage('Хүргэлт хэдэн хоног вэ?')">📦 Хүргэлт</button>
      <button class="qr-btn" onclick="sendMessage('Яаж захиалах вэ?')">🛒 Захиалах</button>
      <button class="qr-btn" onclick="sendMessage('Төлбөр яаж хийх вэ?')">💳 Төлбөр</button>
      <button class="qr-btn" onclick="sendMessage('Үнийн тооцоо яаж хийдэг вэ?')">💰 Үнэ</button>
    </div>

    <div class="input-area">
      <div class="input-wrap">
        <textarea class="msg-input" id="messageInput" placeholder="Асуух зүйлээ бичнэ үү..." rows="1"
          onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}"></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
      </div>
    </div>
  </div>

  <script>
    const CSYS = `Та АриШопын AI туслах чат. АриШоп нь Солонгосоос Монгол руу захиалга дамжуулдаг.
Үндсэн мэдээлэл:
- Вэбсайт: arishop-ruddy.vercel.app
- Утас: +976 7211 8286
- Хаан Банк: 5941051607 (Сүхбаатар Ариунтуяа)
- Стандарт хүргэлт: 7-14 хоног. Хурдан: 5-7 хоног (+20,000₮)
- Үйлчилгээний хураамж: 8%
- Төлбөр: QPay эсвэл Хаан Банк
- Вон ханш: 1 вон = 2.7 төгрөг`;

    let messages = [];
    let busy = false;

    function formatTime() {
      return new Date().toLocaleTimeString('mn-MN', { hour: '2-digit', minute: '2-digit' });
    }

    function addMessage(text, isBot = false) {
      const container = document.getElementById('messages');
      const msg = document.createElement('div');
      msg.className = `message ${isBot ? 'bot' : 'user'}`;
      msg.innerHTML = `
        <div>
          <div class="message-bubble">${text}</div>
          <div class="message-time">${formatTime()}</div>
        </div>
      `;
      container.appendChild(msg);
      container.scrollTop = container.scrollHeight;
    }

    function showTyping() {
      const container = document.getElementById('messages');
      const typing = document.createElement('div');
      typing.id = 'typing';
      typing.className = 'message bot';
      typing.innerHTML = `
        <div class="typing">
          <span></span><span></span><span></span>
        </div>
      `;
      container.appendChild(typing);
      container.scrollTop = container.scrollHeight;
    }

    async function sendMessage(text = null) {
      const input = document.getElementById('messageInput');
      const msg = text || input.value.trim();
      
      if (!msg || busy) return;

      input.value = '';
      input.style.height = 'auto';
      busy = true;
      document.getElementById('sendBtn').disabled = true;
      document.getElementById('quickReplies').style.display = 'none';

      addMessage(msg, false);
      messages.push({ role: 'user', content: msg });

      showTyping();

      try {
        const response = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ system: CSYS, messages: messages })
        });

        const data = await response.json();
        const reply = data.content?.[0]?.text || 'Уучлаарай алдаа гарлаа. +976 7211 8286 дугаарыг дайруулна уу.';
        
        document.getElementById('typing')?.remove();
        addMessage(reply, true);
        messages.push({ role: 'assistant', content: reply });
      } catch (error) {
        document.getElementById('typing')?.remove();
        addMessage('Холболт шалгаад дахин оролдоно уу.\n📞 +976 7211 8286', true);
      }

      busy = false;
      document.getElementById('sendBtn').disabled = false;
    }
  </script>
</body>
</html>
