<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>АриШоп — Захиалга өгөх</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght=300;400;600;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #E8373D; --gold: #F5A623;
    --bg: #09090F; --bg2: #13131C; --bg3: #1A1A26;
    --text: #F0EEE9; --muted: #888899; --border: rgba(255,255,255,0.07);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* NAV */
  nav {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 60px; border-bottom: 1px solid var(--border);
    background: rgba(9,9,15,0.9); backdrop-filter: blur(20px);
    position: sticky; top: 0; z-index: 50;
  }
  .logo { font-size: 22px; font-weight: 900; text-decoration: none; color: var(--text); }
  .logo span { color: var(--red); }
  .back-btn {
    display: flex; align-items: center; gap: 6px;
    color: var(--muted); text-decoration: none; font-size: 14px;
    transition: color 0.2s;
  }
  .back-btn:hover { color: var(--text); }

  /* MAIN */
  .main {
    max-width: 960px; margin: 0 auto;
    padding: 60px 24px 100px;
  }
  .page-title { font-size: 36px; font-weight: 900; letter-spacing: -1px; margin-bottom: 8px; }
  .page-sub { color: var(--muted); font-size: 16px; margin-bottom: 48px; }

  /* STEPS */
  .steps-nav {
    display: flex; gap: 0; margin-bottom: 48px;
    border-bottom: 1px solid var(--border);
  }
  .step-tab {
    display: flex; align-items: center; gap: 10px;
    padding: 16px 24px; font-size: 14px; font-weight: 600;
    color: var(--muted); cursor: pointer; position: relative;
    border: none; background: none; font-family: inherit;
    transition: color 0.2s;
  }
  .step-tab.active { color: var(--text); }
  .step-tab.active::after {
    content: ''; position: absolute; bottom: -1px; left: 0; right: 0;
    height: 2px; background: var(--red);
  }
  .step-tab.done { color: var(--muted); }
  .step-circle {
    width: 24px; height: 24px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; flex-shrink: 0;
    background: var(--bg3); border: 1px solid var(--border);
  }
  .step-tab.active .step-circle { background: var(--red); border-color: var(--red); color: white; }
  .step-tab.done .step-circle { background: #16a34a; border-color: #16a34a; color: white; }

  /* GRID */
  .form-grid { display: grid; grid-template-columns: 1fr 360px; gap: 32px; align-items: start; }

  /* FORM */
  .form-card {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 20px; padding: 36px;
  }
  .section-title {
    font-size: 18px; font-weight: 700; margin-bottom: 24px;
    display: flex; align-items: center; gap: 10px;
  }
  .section-icon {
    width: 32px; height: 32px; border-radius: 8px;
    background: rgba(232,55,61,0.1); color: var(--red);
    display: flex; align-items: center; justify-content: center; font-size: 14px;
  }
  .field { margin-bottom: 20px; }
  .field-label {
    display: block; font-size: 13px; font-weight: 600;
    color: var(--muted); margin-bottom: 8px; letter-spacing: 0.3px;
  }
  .field-label .req { color: var(--red); margin-left: 3px; }
  .field-input {
    width: 100%; background: var(--bg3); border: 1px solid var(--border);
    color: var(--text); padding: 13px 16px; border-radius: 10px;
    font-size: 15px; font-family: 'Outfit', sans-serif;
    outline: none; transition: border-color 0.2s;
  }
  .field-input:focus { border-color: rgba(232,55,61,0.5); }
  .field-input::placeholder { color: var(--muted); }
  .field-input.error { border-color: rgba(232,55,61,0.6); }
  .field-hint { font-size: 12px; color: var(--muted); margin-top: 6px; }
  .field-error { font-size: 12px; color: var(--red); margin-top: 6px; display: none; }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  select.field-input { cursor: pointer; }
  textarea.field-input { resize: vertical; min-height: 80px; }

  /* URL preview */
  .url-preview {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px 16px; margin-top: 10px;
    display: none;
  }
  .url-preview.show { display: flex; align-items: center; gap: 12px; }
  .url-platform-badge {
    font-size: 11px; font-weight: 700; padding: 3px 8px;
    border-radius: 100px; flex-shrink: 0;
  }
  .url-preview-text { font-size: 13px; color: var(--muted); word-break: break-all; }

  /* Qty */
  .qty-wrap { display: flex; align-items: center; gap: 0; }
  .qty-btn {
    width: 44px; height: 46px; background: var(--bg3);
    border: 1px solid var(--border); color: var(--text);
    font-size: 18px; cursor: pointer; transition: background 0.15s;
    font-family: inherit;
  }
